<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  body{margin:0}
  .og{width:1200px;height:630px;background:radial-gradient(800px 400px at 70% -10%,rgba(47,107,255,.25),transparent),#0e1a2f;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;color:#fff;box-sizing:border-box;text-align:center;padding:0 60px}
  .mark{width:70px;height:70px;border-radius:16px;background:linear-gradient(135deg,#2f6bff,#12c2a3);display:grid;place-items:center;font-size:40px;font-weight:800;margin-bottom:24px}
  h1{font-size:66px;font-weight:800;margin:0;letter-spacing:-.02em}
  .g{background:linear-gradient(120deg,#2f6bff,#12c2a3);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{font-size:28px;color:#c3cde0;margin-top:18px;font-weight:600}
  .price{margin-top:26px;font-size:24px;color:#12c2a3;font-weight:700}
</style></head>
<body><div class="og">
  <div class="mark">W</div>
  <h1>Websites that <span class="g">grow</span> your business</h1>
  <div class="sub">Food trucks &middot; Small business &middot; Online ordering &middot; SEO</div>
  <div class="price">From $2,000 &middot; Price-Match &amp; Money-Back Guaranteed</div>
</div></body></html>
